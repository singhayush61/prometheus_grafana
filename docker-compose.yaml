services:
  tempo:
    image: grafana/tempo:latest
    platform: linux/arm64
    volumes:
      - ./shared/tempo/tempo.yml:/etc/tempo-config/tempo.yml
      - tempo-data:/var/tempo
    ports:
      - "4320:4317"
    command: [ "-config.file=/etc/tempo-config/tempo.yml" ]

  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64
    volumes:
      - ./shared/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"

  alloy:
    image: grafana/alloy:latest
    platform: linux/arm64
    volumes:
      - ./shared/alloy/config.alloy:/etc/alloy/config.alloy
    ports:
      - "4317:4317"
      - "4318:4318"
    command: [ "run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data" ]

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./shared/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"

  # Keep your microservices with the amd64 platform tag
  shoehub:
    image: aussiearef/shoehub
    platform: linux/amd64
    ports:
      - "8001:8080"

  # ... (orderservice, paymentservice, stimulator remain the same)