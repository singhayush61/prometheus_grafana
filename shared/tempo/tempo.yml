target: all

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:
  # This block stops Tempo from looking for Kafka
  ring:
    kvstore:
      store: memberlist

ingester:
  lifecycler:
    ring:
      replication_factor: 1
      kvstore:
        store: memberlist

memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

compactor:
  ring:
    kvstore:
      store: memberlist
