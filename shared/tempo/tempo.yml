server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# The 'compactor' section in modern Tempo looks like this:
compactor:
  ring:
    kvstore:
      store: memberlist
  config:
    max_compaction_objects: 1000000
    compaction_cycle: 30s
